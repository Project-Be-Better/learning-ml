name: TraceData CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-and-validate:
    name: "Test, Lint & Model Quality Gate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests (Feature Engineering)
        run: uv run pytest tests/test_features.py -v --tb=short

      - name: Run API smoke tests
        run: uv run pytest tests/test_api.py -v --tb=short
        continue-on-error: true  # API tests require running server, mark optional

      - name: Initialize DB and simulate data
        run: PYTHONPATH=. uv run python -m src.utils.simulator

      - name: Extract features (batch processor)
        run: PYTHONPATH=. uv run python -m src.utils.processor

      - name: Run ML training with quality gate
        id: train
        run: |
          PYTHONPATH=. uv run python -c "
          from src.utils.trainer import train_model
          model = train_model()
          if model is None:
              print('CRITICAL: Training failed or quality gate rejected the model.')
              exit(1)
          print('Model training passed quality gate.')
          "

      - name: Verify model artifact exists
        run: |
          if [ -f "models/smoothness_model.joblib" ]; then
            echo "✅ Model artifact exists."
          else
            echo "❌ Model artifact not found!"
            exit 1
          fi
